<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #1a1a2e; min-height: 100vh; }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: #0f0f1a; border-right: 1px solid #2a2a3e; display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; border-bottom: 1px solid #2a2a3e; }
        .sidebar-header h2 { color: white; font-size: 18px; }
        .sidebar-header h2 i { color: #667eea; margin-right: 8px; }
        .users-list { flex: 1; overflow-y: auto; padding: 16px; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; background: #1a1a2e; }
        .user-item:hover { background: #2a2a3e; }
        .user-item.active { background: #667eea; }
        .user-avatar { width: 40px; height: 40px; background: #667eea; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-avatar i { color: white; }
        .user-info { flex: 1; }
        .user-name { color: white; font-size: 14px; font-weight: 600; }
        .user-email { color: #888; font-size: 11px; margin-top: 2px; }
        .admin-badge { background: #e53e3e; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
        .sidebar-footer { padding: 20px; border-top: 1px solid #2a2a3e; }
        .logout-btn { width: 100%; padding: 10px; background: #2a2a3e; border: none; border-radius: 8px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logout-btn:hover { background: #e53e3e; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 16px 24px; background: #0f0f1a; border-bottom: 1px solid #2a2a3e; }
        .chat-header h1 { color: white; font-size: 18px; }
        .chat-header h1 i { color: #667eea; margin-right: 8px; }
        .chats-panel { width: 300px; background: #0f0f1a; border-right: 1px solid #2a2a3e; display: flex; flex-direction: column; }
        .chats-header { padding: 16px; border-bottom: 1px solid #2a2a3e; color: white; font-size: 14px; font-weight: 600; }
        .chats-list { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; background: #1a1a2e; }
        .chat-item:hover { background: #2a2a3e; }
        .chat-item.active { background: #667eea; }
        .chat-title { color: white; font-size: 13px; font-weight: 500; }
        .chat-date { color: #888; font-size: 10px; margin-top: 4px; }
        .messages-container { flex: 1; display: flex; flex-direction: column; }
        .messages-header { padding: 16px 24px; background: #0f0f1a; border-bottom: 1px solid #2a2a3e; display: flex; justify-content: space-between; align-items: center; }
        .messages-header h3 { color: white; font-size: 16px; }
        .back-btn { background: #2a2a3e; border: none; padding: 6px 12px; border-radius: 6px; color: white; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .messages-list { flex: 1; overflow-y: auto; padding: 24px; }
        .message { display: flex; gap: 12px; margin-bottom: 20px; }
        .message-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .user-msg .message-avatar { background: #667eea; }
        .ai-msg .message-avatar { background: #2a2a3e; }
        .message-avatar i { color: white; font-size: 14px; }
        .message-content { flex: 1; }
        .message-text { background: #2a2a3e; padding: 10px 14px; border-radius: 12px; color: #e0e0e0; font-size: 13px; line-height: 1.5; }
        .user-msg .message-text { background: #667eea; color: white; }
        .message-time { font-size: 10px; color: #666; margin-top: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; }
        .right-panel { display: flex; flex: 1; }
        @media (max-width: 768px) { .chats-panel { display: none; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-shield-alt"></i> Admin Panel</h2>
            </div>
            <div class="users-list" id="usersList">
                <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading users...</div>
            </div>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        <div class="main-content">
            <div class="chat-header">
                <h1><i class="fas fa-users"></i> User Management</h1>
            </div>
            <div class="right-panel" id="rightPanel">
                <div class="empty-state" style="flex:1">
                    <i class="fas fa-user-circle"></i>
                    <p>Select a user from the left</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        let currentUser = null;
        let currentChat = null;
        
        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const data = await res.json();
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = data.users.map(user => `
                <div class="user-item" onclick="selectUser(${user.id})">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.username)} ${user.is_admin ? '<span class="admin-badge">ADMIN</span>' : ''}</div>
                        <div class="user-email">${user.email || 'no email'} | ${user.chats_count} chats</div>
                    </div>
                </div>
            `).join('');
        }
        
        async function selectUser(userId) {
            currentUser = userId;
            currentChat = null;
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.user-item').classList.add('active');
            
            const res = await fetch(`/api/admin/users/${userId}/chats`);
            const data = await res.json();
            
            document.getElementById('rightPanel').innerHTML = `
                <div class="chats-panel">
                    <div class="chats-header"><i class="fas fa-comments"></i> ${escapeHtml(data.username)}'s Chats</div>
                    <div class="chats-list" id="chatsList">
                        ${data.chats.map(chat => `
                            <div class="chat-item" onclick="selectChat(${chat.id})">
                                <div class="chat-title">${escapeHtml(chat.title)}</div>
                                <div class="chat-date">${new Date(chat.updated_at).toLocaleString()}</div>
                            </div>
                        `).join('')}
                        ${data.chats.length === 0 ? '<div class="empty-state"><i class="fas fa-comment-slash"></i>No chats yet</div>' : ''}
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <div class="messages-header">
                        <h3><i class="fas fa-message"></i> Messages</h3>
                    </div>
                    <div class="messages-list" id="messagesList">
                        <div class="empty-state"><i class="fas fa-comment-dots"></i> Select a chat to view messages</div>
                    </div>
                </div>
            `;
        }
        
        async function selectChat(chatId) {
            currentChat = chatId;
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.chat-item').classList.add('active');
            
            const res = await fetch(`/api/admin/users/${currentUser}/chats/${chatId}/messages`);
            const data = await res.json();
            
            document.getElementById('messagesList').innerHTML = data.messages.map(msg => `
                <div class="message ${msg.role === 'user' ? 'user-msg' : 'ai-msg'}">
                    <div class="message-avatar"><i class="fas ${msg.role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div>
                    <div class="message-content">
                        <div class="message-text">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${new Date(msg.timestamp).toLocaleString()} ${msg.model_used ? 'via ' + msg.model_used : ''}</div>
                    </div>
                </div>
            `).join('');
            if (data.messages.length === 0) {
                document.getElementById('messagesList').innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i>No messages in this chat</div>';
            }
        }
        
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        });
        
        loadUsers();
    </script>
</body>
</html>
