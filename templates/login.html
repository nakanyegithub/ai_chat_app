<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .auth-container{background:white;border-radius:24px;padding:48px;width:100%;max-width:440px}
        .logo{text-align:center;margin-bottom:32px}
        .logo i{font-size:48px;color:#667eea}
        .logo h1{font-size:24px;margin-top:12px}
        input{width:100%;padding:14px;margin-bottom:16px;border:2px solid #ddd;border-radius:12px}
        button{width:100%;padding:14px;background:#667eea;color:white;border:none;border-radius:12px;cursor:pointer}
        button:hover{background:#5a67d8}
        .auth-link{text-align:center;margin-top:24px}
        a{color:#667eea;text-decoration:none}
        .error{background:#fee2e2;color:#dc2626;padding:12px;border-radius:10px;margin-top:16px;display:none}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo"><i class="fas fa-robot"></i><h1>AI Chat</h1></div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="auth-link">No account? <a href="/register">Register</a></div>
        <div id="errorMsg" class="error"></div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username.value, password: password.value})
            });
            const data = await res.json();
            if (res.ok) location.href = '/chat';
            else { errorMsg.textContent = data.error; errorMsg.style.display = 'block'; }
        };
    </script>
</body>
</html>
