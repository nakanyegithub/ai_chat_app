<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-container { background: white; border-radius: 24px; padding: 48px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo i { font-size: 48px; color: #667eea; }
        .logo h1 { font-size: 24px; margin-top: 12px; color: #1a1a2e; }
        .auth-form input { width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 2px solid #e1e5e9; border-radius: 12px; font-size: 15px; transition: all 0.3s; }
        .auth-form input:focus { outline: none; border-color: #667eea; }
        .auth-form button { width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .auth-form button:hover { background: #5a67d8; }
        .auth-link { text-align: center; margin-top: 24px; color: #666; }
        .auth-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 10px; margin-top: 16px; text-align: center; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <i class="fas fa-robot"></i>
            <h1>Create Account</h1>
        </div>
        <form class="auth-form" id="registerForm">
            <input type="text" id="username" placeholder="Username (min 3 characters)" required>
            <input type="email" id="email" placeholder="Email (optional)">
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <div class="auth-link">
            Already have an account? <a href="/login">Login</a>
        </div>
        <div id="errorMsg" class="error"></div>
    </div>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, email, password})
            });
            
            const data = await response.json();
            if (response.ok) {
                window.location.href = '/chat';
            } else {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.textContent = data.error;
                errorDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
